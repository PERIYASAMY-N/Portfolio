<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Portfolio CMS</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="login-page">

  <div class="card login-card">
    <div class="login-logo">Portfolio CMS</div>
    <div id="login-error" class="login-error">Invalid credentials.</div>
    <form id="login-form">
      <div class="form-group" style="text-align: left;">
        <label class="form-label" for="username">Username or Email</label>
        <input type="text" id="username" class="form-control" required autocomplete="username">
      </div>
      <div class="form-group" style="text-align: left;">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-control" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px; padding: 12px;">Login to Dashboard</button>
    </form>
    <div style="margin-top: 24px; font-size: 0.85rem; color: #8d99ae;">
      <a href="../index.html">← Back to Portfolio</a>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/admin/auth.js"></script>
</body>
</html>
