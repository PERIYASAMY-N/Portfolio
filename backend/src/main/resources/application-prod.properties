# =====================================================
# PRODUCTION CONFIGURATION FOR RENDER
# =====================================================
spring.application.name=portfolio-cms

# =====================================================
# DATABASE CONFIGURATION (From Render Environment)
# =====================================================
# Database URL is configured in DatabaseConfig.java to handle Render's URL format
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =====================================================
# JPA / HIBERNATE
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# =====================================================
# SERVER
# =====================================================
server.port=${PORT:8080}
server.servlet.context-path=/

# =====================================================
# JWT CONFIGURATION
# =====================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# =====================================================
# FILE UPLOAD
# =====================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=/opt/render/project/src/uploads/

# =====================================================
# ADMIN CREDENTIALS
# =====================================================
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD}
app.admin.email=${ADMIN_EMAIL:admin@portfolio.com}

# =====================================================
# CORS (Allow Vercel Frontend)
# =====================================================
app.cors.allowed-origins=${FRONTEND_URL:https://your-vercel-app.vercel.app}

# =====================================================
# ACTUATOR (for health checks)
# =====================================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
