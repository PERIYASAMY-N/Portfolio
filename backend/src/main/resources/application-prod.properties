# =====================================================
# PRODUCTION CONFIGURATION FOR RENDER
# =====================================================

spring.application.name=portfolio-cms

# =====================================================
# DATABASE CONFIGURATION (Render MySQL)
# =====================================================
# These will be set via environment variables in Render
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/portfolio_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# JPA / HIBERNATE
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false

# =====================================================
# SERVER
# =====================================================
server.port=${PORT:8080}
server.servlet.context-path=/

# =====================================================
# JWT CONFIGURATION
# =====================================================
jwt.secret=${JWT_SECRET:your-super-secret-key-that-is-at-least-256-bits-long-for-HS256}
jwt.expiration=86400000

# =====================================================
# FILE UPLOAD
# =====================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=/tmp/uploads/

# =====================================================
# ADMIN CREDENTIALS
# =====================================================
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:Admin@123}
app.admin.email=${ADMIN_EMAIL:admin@portfolio.com}

# =====================================================
# CORS - Allow Vercel Frontend
# =====================================================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# =====================================================
# LOGGING
# =====================================================
logging.level.root=INFO
logging.level.com.portfolio=INFO

# =====================================================
# SECURITY
# =====================================================
server.error.include-message=never
server.error.include-stacktrace=never
