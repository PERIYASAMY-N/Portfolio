spring.application.name=portfolio-cms

# =====================================================
# DATABASE CONFIGURATION - Local PostgreSQL
# =====================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/portfolio_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# =====================================================
# JPA / HIBERNATE
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =====================================================
# SERVER
# =====================================================
server.port=8080
server.servlet.context-path=/

# =====================================================
# JWT CONFIGURATION
# =====================================================
jwt.secret=your-super-secret-key-that-is-at-least-256-bits-long-for-HS256
jwt.expiration=86400000

# =====================================================
# FILE UPLOAD
# =====================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads/

# =====================================================
# ADMIN CREDENTIALS (Initial Setup)
# =====================================================
app.admin.username=admin
app.admin.password=Admin@123
app.admin.email=admin@portfolio.com

# =====================================================
# CORS
# =====================================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500

# =====================================================
# ACTUATOR
# =====================================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
