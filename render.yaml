services:
  # Backend Spring Boot Application - Docker deployment
  - type: web
    name: portfolio-backend
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: singapore
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@portfolio.com
      - key: FRONTEND_URL
        value: https://your-vercel-app.vercel.app
    healthCheckPath: /actuator/health

databases:
  - name: portfolio-db
    databaseName: portfolio_db
    user: portfolio_user
    region: singapore
    plan: free
